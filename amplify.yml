# NOTE: amplify.yml が /frontend から出ている理由
# Amplify の GitHub CICD をする際に、レポジトリのルートに配置が期待されているため
#
# NOTE: backend セクションを宣言しない理由
# Amplify Gen2 は amplify/ ディレクトリを自動検出してバックエンドをデプロイする
# pipeline-deploy を手動で呼ぶと Docker が必要になるため、Amplify に任せる
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
