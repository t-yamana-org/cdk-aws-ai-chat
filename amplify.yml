# NOTE: amplify.yml が /frontend から出ている理由
# Amplify の GitHub CICD をする際に、レポジトリのルートに配置が期待されているため
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        build:
          commands:
            - npm install
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
