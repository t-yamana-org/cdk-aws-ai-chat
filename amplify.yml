# NOTE: amplify.yml が /frontend から出ている理由
# Amplify の GitHub CICD をする際に、レポジトリのルートに配置が期待されているため
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        build:
          commands:
            - npm install
            # 変数は Amplify コンソール上で自動設定されている
            - CDK_DOCKER=echo npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
